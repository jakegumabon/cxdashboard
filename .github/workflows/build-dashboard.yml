name: Build & Deploy CX Dashboard

on:
  # Trigger when data, template, or pipeline script changes
  push:
    paths:
      - 'data/latest.zip'
      - 'template/dashboard.html'
      - 'scripts/csv_to_dashboard.py'
    branches:
      - main

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify data file exists
        run: |
          if [ ! -f data/latest.zip ]; then
            echo "ERROR: data/latest.zip not found"
            exit 1
          fi
          echo "Zip size: $(du -h data/latest.zip | cut -f1)"
          unzip -l data/latest.zip

      - name: Build dashboard
        run: |
          python scripts/csv_to_dashboard.py data/latest.zip \
            --template template/dashboard.html \
            --output docs/index.html

      - name: Verify output
        run: |
          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html was not generated"
            exit 1
          fi
          echo "Dashboard size: $(du -h docs/index.html | cut -f1)"
          grep -q "RAW_TICKETS" docs/index.html && echo "✓ RAW_TICKETS found"
          grep -q "ASSIGNEE_GROUP" docs/index.html && echo "✓ ASSIGNEE_GROUP found"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
