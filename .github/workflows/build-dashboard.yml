name: Build CX Dashboard

on:
  # Trigger when data/latest.zip is updated (by Google Apps Script)
  push:
    paths:
      - 'data/latest.zip'
    branches:
      - main

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify data file exists
        run: |
          if [ ! -f data/latest.zip ]; then
            echo "ERROR: data/latest.zip not found"
            exit 1
          fi
          echo "Zip file size: $(du -h data/latest.zip | cut -f1)"
          echo "Zip contents:"
          unzip -l data/latest.zip

      - name: Build dashboard
        run: |
          python scripts/csv_to_dashboard.py data/latest.zip \
            --template template/dashboard.html \
            --output docs/index.html

      - name: Verify output
        run: |
          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html was not generated"
            exit 1
          fi
          echo "Dashboard size: $(du -h docs/index.html | cut -f1)"
          grep -q "RAW_TICKETS" docs/index.html && echo "✓ RAW_TICKETS found"
          grep -q "ASSIGNEE_GROUP" docs/index.html && echo "✓ ASSIGNEE_GROUP found"

      - name: Commit built dashboard back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "build: update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
